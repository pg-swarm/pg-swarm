syntax = "proto3";

package pgswarm.v1;

option go_package = "github.com/pg-swarm/pg-swarm/api/gen/v1;pgswarmv1";

import "google/protobuf/timestamp.proto";
import "health.proto";
import "backup.proto";

service SatelliteStreamService {
  rpc Connect(stream SatelliteMessage) returns (stream CentralMessage);
}

message SatelliteMessage {
  oneof payload {
    Heartbeat heartbeat = 1;
    ClusterHealthReport health_report = 2;
    EventReport event_report = 3;
    ConfigAck config_ack = 4;
    StorageClassReport storage_class_report = 5;
    SwitchoverResult switchover_result = 6;
    LogEntry log_entry = 7;
    BackupStatusReport backup_status = 8;
    RestoreStatusReport restore_status = 9;
    SwitchoverProgress switchover_progress = 10;
    // field 11 reserved
    DatabaseStatusReport database_status = 12;
    Event event = 13;
  }
}

// DatabaseStatusReport is sent satellite → central after a cluster database
// creation attempt via sidecar.
message DatabaseStatusReport {
  string cluster_name  = 1;
  string namespace     = 2;
  string db_name       = 3;
  string status        = 4;  // "created" or "failed"
  string error_message = 5;
}

message LogEntry {
  string level = 1;
  string message = 2;
  map<string, string> fields = 3;
  google.protobuf.Timestamp timestamp = 4;
  string logger = 5;  // source component: "agent", "operator", "stream", "health"
}

message SetLogLevel {
  string level = 1;  // "trace", "debug", "info", "warn", "error"
}

message CentralMessage {
  oneof payload {
    ClusterConfig cluster_config = 1;
    DeleteCluster delete_cluster = 2;
    HeartbeatAck heartbeat_ack = 3;
    RequestStorageClasses request_storage_classes = 4;
    SwitchoverRequest switchover = 5;
    SetLogLevel set_log_level = 6;
    RestoreCommand restore_command = 7;
    BackupTrigger backup_trigger = 20;
    Event event = 21;
  }
}

// SwitchoverRequest tells the satellite to promote a specific replica to primary.
message SwitchoverRequest {
  string cluster_name = 1;
  string namespace = 2;
  string target_pod = 3;   // pod to promote (must be a replica)
  string operation_id = 4; // unique operation ID for progress tracking
  bool interactive = 5;    // if true, execute one step at a time, waiting for user confirmation
}

// SwitchoverResult is sent back by the satellite after a switchover attempt.
message SwitchoverResult {
  string cluster_name = 1;
  bool success = 2;
  string error_message = 3;
  string operation_id = 4; // echoed from SwitchoverRequest
}

// SwitchoverProgress reports step-by-step progress during a switchover.
message SwitchoverProgress {
  string operation_id = 1;
  string cluster_name = 2;
  int32 step = 3;
  string step_name = 4;
  string status = 5;       // pending, starting, completed, failed, rolling_back
  string target_pod = 6;
  string error_message = 7;
  bool point_of_no_return = 8;
  google.protobuf.Timestamp timestamp = 9;
}

message StorageClassReport {
  repeated StorageClassInfo storage_classes = 1;
}

message StorageClassInfo {
  string name = 1;
  string provisioner = 2;
  string reclaim_policy = 3;
  string volume_binding_mode = 4;
  bool is_default = 5;
}

message RequestStorageClasses {}

message Heartbeat {
  google.protobuf.Timestamp timestamp = 1;
}

message HeartbeatAck {
  google.protobuf.Timestamp timestamp = 1;
}

message ConfigAck {
  string cluster_name = 1;
  int64 config_version = 2;
  bool success = 3;
  string error_message = 4;
}

message ClusterConfig {
  string cluster_name = 1;
  string namespace = 2;
  int32 replicas = 3;
  PostgresSpec postgres = 4;
  StorageSpec storage = 5;
  ResourceSpec resources = 6;
  map<string, string> pg_params = 7;
  repeated string hba_rules = 8;
  int64 config_version = 9;
  ArchiveSpec archive = 10;           // optional WAL archiving config
  // field 11 reserved (was databases)
  SentinelSpec sentinel = 12;            // optional automatic sentinel sidecar
  StorageSpec wal_storage = 13;          // optional separate WAL volume
  string profile_name = 14;                      // name of the source profile (for K8s labels)
  map<string, string> label_selector = 15;       // deployment rule label selector (for K8s labels)
  bool paused = 16;                              // when true, RW service is removed (read-only mode)
  bool deletion_protection = 17;                  // when true, PVCs get a finalizer to prevent accidental deletion
  BackupConfig backups = 18;                        // backup sidecar configuration (resolved from profile + store)
  repeated RecoveryRule recovery_rules = 19;       // log-based recovery rules for sentinel sidecar
  repeated ClusterDatabase cluster_databases = 21; // dynamically managed databases at cluster level
}

message PostgresSpec {
  string version = 1;
  string image = 2;
}

message StorageSpec {
  string size = 1;
  string storage_class = 2;
}

message ResourceSpec {
  string cpu_request = 1;
  string cpu_limit = 2;
  string memory_request = 3;
  string memory_limit = 4;
}

// ClusterDatabase is a database dynamically managed at the cluster level
// (not part of the profile). Includes connection access control via CIDRs.
message ClusterDatabase {
  string db_name = 1;
  string db_user = 2;
  string password = 3;               // decrypted, for K8s secret creation
  repeated string allowed_cidrs = 4; // e.g. ["10.0.0.0/8"]; empty = 0.0.0.0/0
}

message ArchiveSpec {
  string mode = 1;                          // "custom"; empty = disabled
  string archive_command = 2;               // required for "custom"
  string restore_command = 3;               // optional for "custom"
  int32 archive_timeout_seconds = 4;        // default 60
  ArchiveStorageSpec archive_storage = 5;   // deprecated — PVC archive mode removed
  SecretRef credentials_secret = 6;         // for "custom" mode
}

// Deprecated: PVC archive mode has been removed. This message is retained
// for proto wire compatibility but is no longer used.
message ArchiveStorageSpec {
  string size = 1;
  string storage_class = 2;
}

message SecretRef {
  string name = 1;  // existing K8s Secret in cluster namespace
}

message SentinelSpec {
  bool enabled = 1;
  int32 health_check_interval_seconds = 2; // default 5
  string sidecar_image = 3;                // default: pg-swarm-sentinel:latest
}

message RecoveryRule {
  string name = 1;
  string pattern = 2;           // regex matched against each PG log line
  string severity = 3;          // critical, error, warning, info
  string action = 4;            // restart, rewind, rebasebackup, event, exec
  string exec_command = 5;      // only used when action=exec
  int32  cooldown_seconds = 6;
  bool   enabled = 7;
  string category = 8;          // grouping label for UI display
}

message DeleteCluster {
  string cluster_name = 1;
  string namespace = 2;
}

// --- Event-driven architecture ---
//
// Event is the universal message type for the event-driven framework.
// Events are immutable facts about what happened. They flow in all directions:
//   Central  -> Satellite  (user-initiated: cluster.create, switchover.requested)
//   Satellite -> Central   (state changes: cluster.state_changed, recovery.completed)
//   Sidecar  -> Satellite  (pod-level: instance.pg_down, log.wal.missing_checkpoint)
//   K8s watch -> Satellite  (infrastructure: k8s.pod.ready, k8s.statefulset.updated)
message Event {
  string id = 1;                           // UUID, generated at source
  string type = 2;                         // dot-separated: "cluster.create", "instance.pg_down"
  string cluster_name = 3;
  string namespace = 4;
  string pod_name = 5;                     // empty for cluster-level events
  string severity = 6;                     // info, warning, error, critical
  map<string, string> data = 7;            // event-specific key-value pairs
  google.protobuf.Timestamp timestamp = 8;
  string source = 9;                       // "central", "satellite", "sidecar", "k8s-watch"
  string operation_id = 10;                // correlates multi-step operations

  // Typed payloads for events that carry structured proto data.
  // Most events use only the data map; these are for events carrying
  // rich configuration (cluster lifecycle, switchover, etc.).
  oneof payload {
    ClusterConfig cluster_config = 20;         // cluster.create, cluster.update
    SwitchoverRequest switchover_request = 21; // switchover.requested
    DeleteCluster delete_cluster = 22;         // cluster.delete
    RestoreCommand restore_command = 23;       // restore.requested
    BackupTrigger backup_trigger = 24;         // backup.trigger
    ClusterHealthReport health_report = 25;    // health.report (rich instance data)
  }
}

// --- Sidecar ↔ Satellite bidi stream ---

service SidecarStreamService {
  rpc Connect(stream SidecarMessage) returns (stream SidecarCommand);
}

// Sidecar → Satellite
message SidecarMessage {
  oneof payload {
    SidecarIdentity identity = 1;    // sent on connect
    SidecarHeartbeat heartbeat = 2;
    CommandResult command_result = 3; // response to a command
    Event event = 4;                 // sidecar -> satellite events
  }
}

message SidecarIdentity {
  string pod_name = 1;
  string cluster_name = 2;
  string namespace = 3;
}

message SidecarHeartbeat {
  google.protobuf.Timestamp timestamp = 1;
}

message CommandResult {
  string request_id = 1;
  bool success = 2;
  string error = 3;
  bool in_recovery = 4;   // populated by StatusCmd
  bool is_fenced = 5;     // populated by StatusCmd
}

// Satellite → Sidecar
message SidecarCommand {
  string request_id = 1;
  oneof cmd {
    FenceCmd fence = 2;
    CheckpointCmd checkpoint = 3;
    PromoteCmd promote = 4;
    UnfenceCmd unfence = 5;
    StatusCmd status = 6;
    SidecarHeartbeatAck heartbeat_ack = 7;
    CreateDatabaseCmd create_database = 8;
    ReloadConfCmd reload_conf = 9;
    Event event = 10;                    // event-driven command path
  }
}

message FenceCmd { int32 drain_timeout_seconds = 1; }
message CheckpointCmd {}
message PromoteCmd { int32 wait_timeout_seconds = 1; }
message UnfenceCmd {}
message StatusCmd {}
message SidecarHeartbeatAck {}
message CreateDatabaseCmd {
  string db_name = 1;
  string db_user = 2;
  string password = 3;
}
message ReloadConfCmd {}
