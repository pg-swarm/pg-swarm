syntax = "proto3";

package pgswarm.v1;

option go_package = "github.com/pg-swarm/pg-swarm/api/gen/v1;pgswarmv1";

import "google/protobuf/timestamp.proto";
import "common.proto";

message ClusterHealthReport {
  string cluster_name = 1;
  ClusterState state = 2;
  repeated InstanceHealth instances = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message InstanceHealth {
  string pod_name = 1;
  InstanceRole role = 2;
  bool ready = 3;
  int64 replication_lag_bytes = 4;
  string error_message = 5;
  double replication_lag_seconds = 6;  // time-based lag from pg_last_xact_replay_timestamp (replicas)
  int32 connections_used = 7;          // current connection count
  int32 connections_max = 8;           // max_connections setting
  int64 disk_used_bytes = 9;           // sum of pg_database_size()
  int64 timeline_id = 10;             // pg_control_checkpoint() timeline
  google.protobuf.Timestamp pg_start_time = 11; // pg_postmaster_start_time()
  bool wal_receiver_active = 12;      // pg_stat_wal_receiver.status = 'streaming' (replicas)
}

message EventReport {
  string cluster_name = 1;
  string severity = 2; // info, warning, error, critical
  string message = 3;
  string source = 4;
  google.protobuf.Timestamp timestamp = 5;
}
