<svg viewBox="0 0 860 480" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Backup Rules -->
  <rect x="30" y="20" width="180" height="160" rx="12" fill="#1a2332" stroke="#046d39" stroke-width="2"/>
  <text x="120" y="48" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Inter, sans-serif">Backup Rules</text>
  <rect x="48" y="64" width="144" height="28" rx="5" fill="rgba(4,109,57,0.1)" stroke="rgba(4,109,57,0.3)" stroke-width="1"/>
  <text x="120" y="83" text-anchor="middle" fill="#3ddc84" font-size="11" font-family="JetBrains Mono, monospace">S3 Weekly Base</text>
  <rect x="48" y="100" width="144" height="28" rx="5" fill="rgba(4,109,57,0.1)" stroke="rgba(4,109,57,0.3)" stroke-width="1"/>
  <text x="120" y="119" text-anchor="middle" fill="#3ddc84" font-size="11" font-family="JetBrains Mono, monospace">GCS Daily Logical</text>
  <rect x="48" y="136" width="144" height="28" rx="5" fill="rgba(4,109,57,0.1)" stroke="rgba(4,109,57,0.3)" stroke-width="1"/>
  <text x="120" y="155" text-anchor="middle" fill="#3ddc84" font-size="11" font-family="JetBrains Mono, monospace">Local PVC + WAL</text>

  <!-- Arrows: Rules -> Profile -->
  <line x1="210" y1="78" x2="280" y2="78" stroke="#046d39" stroke-width="2"/>
  <line x1="210" y1="114" x2="280" y2="100" stroke="#046d39" stroke-width="2"/>
  <polygon points="280,78 272,74 272,82" fill="#046d39"/>
  <text x="245" y="70" text-anchor="middle" fill="#8899aa" font-size="9" font-family="Inter, sans-serif">attach</text>

  <!-- Profile -->
  <rect x="280" y="50" width="160" height="80" rx="12" fill="#1a2332" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <text x="360" y="78" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="Inter, sans-serif">Cluster Profile</text>
  <text x="360" y="100" text-anchor="middle" fill="#8899aa" font-size="11" font-family="Inter, sans-serif">edge-production</text>

  <!-- Arrow: Profile -> Cluster Configs -->
  <line x1="440" y1="90" x2="520" y2="90" stroke="#046d39" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="450" y="78" width="60" height="18" rx="3" fill="#0f1923"/>
  <text x="480" y="91" text-anchor="middle" fill="#8899aa" font-size="9" font-family="Inter, sans-serif">deploy</text>

  <!-- Cluster Configs -->
  <rect x="520" y="30" width="250" height="120" rx="12" fill="#1a2332" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <text x="645" y="58" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="Inter, sans-serif">Satellite Clusters</text>
  <rect x="538" y="70" width="100" height="28" rx="5" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="588" y="89" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="JetBrains Mono, monospace">site-nyc</text>
  <rect x="650" y="70" width="100" height="28" rx="5" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="700" y="89" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="JetBrains Mono, monospace">site-lon</text>
  <rect x="538" y="106" width="100" height="28" rx="5" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="588" y="125" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="JetBrains Mono, monospace">site-tok</text>
  <text x="700" y="125" text-anchor="middle" fill="#556677" font-size="16" font-family="Inter, sans-serif">...</text>

  <!-- Arrow down: gRPC push -->
  <line x1="645" y1="150" x2="645" y2="210" stroke="#046d39" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="575" y="170" width="140" height="18" rx="3" fill="#0f1923"/>
  <text x="645" y="183" text-anchor="middle" fill="#8899aa" font-size="9" font-family="Inter, sans-serif">gRPC push (BackupConfig)</text>

  <!-- Satellite Operator -->
  <rect x="460" y="210" width="370" height="140" rx="12" fill="#1a2332" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <text x="645" y="238" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="Inter, sans-serif">Satellite Operator</text>

  <!-- CronJobs inside operator -->
  <rect x="478" y="252" width="100" height="36" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="528" y="267" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="600" font-family="JetBrains Mono, monospace">CronJob</text>
  <text x="528" y="280" text-anchor="middle" fill="#fb923c" font-size="8" font-family="JetBrains Mono, monospace">base-backup-s3</text>

  <rect x="590" y="252" width="100" height="36" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="640" y="267" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="600" font-family="JetBrains Mono, monospace">CronJob</text>
  <text x="640" y="280" text-anchor="middle" fill="#fb923c" font-size="8" font-family="JetBrains Mono, monospace">logical-gcs</text>

  <rect x="702" y="252" width="110" height="36" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="757" y="267" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="600" font-family="JetBrains Mono, monospace">postgresql.conf</text>
  <text x="757" y="280" text-anchor="middle" fill="#fb923c" font-size="8" font-family="JetBrains Mono, monospace">archive_command</text>

  <!-- WAL archiving label -->
  <rect x="478" y="300" width="338" height="36" rx="5" fill="rgba(4,109,57,0.1)" stroke="rgba(4,109,57,0.3)" stroke-width="1"/>
  <text x="647" y="323" text-anchor="middle" fill="#3ddc84" font-size="11" font-family="Inter, sans-serif">Auto-configured WAL archiving + retention enforcement</text>

  <!-- Arrow down: status -->
  <line x1="645" y1="350" x2="645" y2="400" stroke="#046d39" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="565" y="365" width="160" height="18" rx="3" fill="#0f1923"/>
  <text x="645" y="378" text-anchor="middle" fill="#8899aa" font-size="9" font-family="Inter, sans-serif">BackupStatusReport (gRPC)</text>

  <!-- Central tables -->
  <rect x="460" y="400" width="170" height="60" rx="10" fill="#1a2332" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <text x="545" y="425" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600" font-family="JetBrains Mono, monospace">backup_inventory</text>
  <text x="545" y="445" text-anchor="middle" fill="#8899aa" font-size="10" font-family="Inter, sans-serif">type, status, size, LSN</text>

  <rect x="660" y="400" width="170" height="60" rx="10" fill="#1a2332" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <text x="745" y="425" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600" font-family="JetBrains Mono, monospace">restore_operations</text>
  <text x="745" y="445" text-anchor="middle" fill="#8899aa" font-size="10" font-family="Inter, sans-serif">PITR or logical</text>

  <!-- Destinations (left side bottom) -->
  <rect x="30" y="250" width="180" height="120" rx="12" fill="#1a2332" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <text x="120" y="278" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600" font-family="Inter, sans-serif">Destinations</text>
  <text x="120" y="302" text-anchor="middle" fill="#3ddc84" font-size="11" font-family="JetBrains Mono, monospace">S3 / MinIO</text>
  <text x="120" y="322" text-anchor="middle" fill="#3ddc84" font-size="11" font-family="JetBrains Mono, monospace">GCS</text>
  <text x="120" y="342" text-anchor="middle" fill="#3ddc84" font-size="11" font-family="JetBrains Mono, monospace">SFTP / Local PVC</text>

  <!-- Arrow: CronJobs -> Destinations -->
  <line x1="478" y1="270" x2="210" y2="300" stroke="rgba(251,146,60,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="340" y="275" text-anchor="middle" fill="#8899aa" font-size="9" font-family="Inter, sans-serif">upload</text>
</svg>
