  <rect x="300" y="250" width="200" height="230" rx="12" fill="#1a2332" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <text x="400" y="278" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="Inter, sans-serif">Satellite B</text>
  <rect x="322" y="290" width="156" height="28" rx="5" fill="rgba(4,109,57,0.1)" stroke="rgba(4,109,57,0.3)" stroke-width="1"/>
  <text x="400" y="309" text-anchor="middle" fill="#8899aa" font-size="11" font-family="Inter, sans-serif">Operator + Health Monitor</text>
  <rect x="322" y="330" width="44" height="32" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="344" y="350" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="500" font-family="JetBrains Mono, monospace">FS</text>
  <rect x="378" y="330" width="44" height="32" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="400" y="350" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="500" font-family="JetBrains Mono, monospace">FS</text>
  <rect x="434" y="330" width="44" height="32" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="456" y="350" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="500" font-family="JetBrains Mono, monospace">FS</text>
  <text x="344" y="378" text-anchor="middle" fill="#666" font-size="9" font-family="Inter, sans-serif">pod-0</text>
  <text x="400" y="378" text-anchor="middle" fill="#666" font-size="9" font-family="Inter, sans-serif">pod-1</text>
  <text x="456" y="378" text-anchor="middle" fill="#666" font-size="9" font-family="Inter, sans-serif">pod-2</text>
  <rect x="330" y="400" width="140" height="24" rx="4" fill="rgba(59,130,246,0.08)"/>
  <text x="400" y="416" text-anchor="middle" fill="#6688aa" font-size="11" font-family="Inter, sans-serif">K8s Edge Cluster</text>

  <!-- Satellite N -->
  <rect x="570" y="250" width="200" height="230" rx="12" fill="#1a2332" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <text x="670" y="278" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="Inter, sans-serif">Satellite N</text>
  <rect x="592" y="290" width="156" height="28" rx="5" fill="rgba(4,109,57,0.1)" stroke="rgba(4,109,57,0.3)" stroke-width="1"/>
  <text x="670" y="309" text-anchor="middle" fill="#8899aa" font-size="11" font-family="Inter, sans-serif">Operator + Health Monitor</text>
  <rect x="592" y="330" width="44" height="32" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="614" y="350" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="500" font-family="JetBrains Mono, monospace">FS</text>
  <rect x="648" y="330" width="44" height="32" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="670" y="350" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="500" font-family="JetBrains Mono, monospace">FS</text>
  <rect x="704" y="330" width="44" height="32" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="726" y="350" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="500" font-family="JetBrains Mono, monospace">FS</text>
  <text x="614" y="378" text-anchor="middle" fill="#666" font-size="9" font-family="Inter, sans-serif">pod-0</text>
  <text x="670" y="378" text-anchor="middle" fill="#666" font-size="9" font-family="Inter, sans-serif">pod-1</text>
  <text x="726" y="378" text-anchor="middle" fill="#666" font-size="9" font-family="Inter, sans-serif">pod-2</text>
  <rect x="600" y="400" width="140" height="24" rx="4" fill="rgba(59,130,246,0.08)"/>
  <text x="670" y="416" text-anchor="middle" fill="#6688aa" font-size="11" font-family="Inter, sans-serif">K8s Edge Cluster</text>

  <!-- Ellipsis between B and N -->
  <text x="535" y="370" text-anchor="middle" fill="#556677" font-size="24" font-family="Inter, sans-serif">...</text>

  <!-- Legend -->
  <rect x="240" y="490" width="12" height="12" rx="2" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="258" y="501" fill="#8899aa" font-size="11" font-family="Inter, sans-serif">FS = Failover Sidecar (per pod)</text>
