<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Central Control Plane -->
  <rect x="150" y="20" width="500" height="140" rx="12" fill="#1a2332" stroke="#046d39" stroke-width="2"/>
  <text x="400" y="52" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700" font-family="Inter, sans-serif">Central Control Plane</text>
  <!-- Service boxes inside Central -->
  <rect x="180" y="68" width="130" height="36" rx="6" fill="rgba(4,109,57,0.15)" stroke="#046d39" stroke-width="1"/>
  <text x="245" y="91" text-anchor="middle" fill="#3ddc84" font-size="12" font-family="JetBrains Mono, monospace">gRPC :9090</text>
  <rect x="335" y="68" width="130" height="36" rx="6" fill="rgba(4,109,57,0.15)" stroke="#046d39" stroke-width="1"/>
  <text x="400" y="91" text-anchor="middle" fill="#3ddc84" font-size="12" font-family="JetBrains Mono, monospace">REST :8080</text>
  <rect x="490" y="68" width="130" height="36" rx="6" fill="rgba(4,109,57,0.15)" stroke="#046d39" stroke-width="1"/>
  <text x="555" y="91" text-anchor="middle" fill="#3ddc84" font-size="12" font-family="JetBrains Mono, monospace">Dashboard</text>
  <!-- PostgreSQL metadata -->
  <rect x="250" y="116" width="300" height="30" rx="6" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="400" y="136" text-anchor="middle" fill="#93c5fd" font-size="12" font-family="JetBrains Mono, monospace">PostgreSQL (metadata)</text>

  <!-- Connection lines -->
  <line x1="260" y1="160" x2="130" y2="250" stroke="#046d39" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="400" y1="160" x2="400" y2="250" stroke="#046d39" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="540" y1="160" x2="670" y2="250" stroke="#046d39" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Connection label -->
  <rect x="290" y="195" width="220" height="22" rx="4" fill="#0f1923"/>
  <text x="400" y="211" text-anchor="middle" fill="#8899aa" font-size="11" font-family="Inter, sans-serif">gRPC bidirectional streams</text>

  <!-- Satellite A -->
  <rect x="30" y="250" width="200" height="230" rx="12" fill="#1a2332" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <text x="130" y="278" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="Inter, sans-serif">Satellite A</text>
  <rect x="52" y="290" width="156" height="28" rx="5" fill="rgba(4,109,57,0.1)" stroke="rgba(4,109,57,0.3)" stroke-width="1"/>
  <text x="130" y="309" text-anchor="middle" fill="#8899aa" font-size="11" font-family="Inter, sans-serif">Operator + Health Monitor</text>
  <!-- Failover Sidecars -->
  <rect x="52" y="330" width="44" height="32" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="74" y="350" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="500" font-family="JetBrains Mono, monospace">FS</text>
  <rect x="108" y="330" width="44" height="32" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="130" y="350" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="500" font-family="JetBrains Mono, monospace">FS</text>
  <rect x="164" y="330" width="44" height="32" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="186" y="350" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="500" font-family="JetBrains Mono, monospace">FS</text>
  <!-- Pod labels -->
  <text x="74" y="378" text-anchor="middle" fill="#666" font-size="9" font-family="Inter, sans-serif">pod-0</text>
  <text x="130" y="378" text-anchor="middle" fill="#666" font-size="9" font-family="Inter, sans-serif">pod-1</text>
  <text x="186" y="378" text-anchor="middle" fill="#666" font-size="9" font-family="Inter, sans-serif">pod-2</text>
  <!-- K8s Edge label -->
  <rect x="60" y="400" width="140" height="24" rx="4" fill="rgba(59,130,246,0.08)"/>
  <text x="130" y="416" text-anchor="middle" fill="#6688aa" font-size="11" font-family="Inter, sans-serif">K8s Edge Cluster</text>
  <!-- Role badges -->
  <rect x="52" y="438" width="44" height="16" rx="3" fill="rgba(4,109,57,0.3)"/>
  <text x="74" y="449" text-anchor="middle" fill="#3ddc84" font-size="8" font-weight="600" font-family="Inter, sans-serif">PRIMARY</text>
  <rect x="108" y="438" width="44" height="16" rx="3" fill="rgba(59,130,246,0.15)"/>
  <text x="130" y="449" text-anchor="middle" fill="#93c5fd" font-size="8" font-weight="600" font-family="Inter, sans-serif">REPLICA</text>
  <rect x="164" y="438" width="44" height="16" rx="3" fill="rgba(59,130,246,0.15)"/>
  <text x="186" y="449" text-anchor="middle" fill="#93c5fd" font-size="8" font-weight="600" font-family="Inter, sans-serif">REPLICA</text>

