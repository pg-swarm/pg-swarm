apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/managed-by: pg-swarm
    app.kubernetes.io/name: postgresql
    pg-swarm.io/cluster: app-pg
  name: app-pg
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: pg-swarm
      app.kubernetes.io/name: postgresql
      pg-swarm.io/cluster: app-pg
  serviceName: app-pg-headless
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: pg-swarm
        app.kubernetes.io/name: postgresql
        pg-swarm.io/cluster: app-pg
    spec:
      containers:
      - env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: superuser-password
              name: app-pg-secret
        image: postgres:17-alpine
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          failureThreshold: 6
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        name: postgres
        ports:
        - containerPort: 5432
          name: postgres
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          failureThreshold: 3
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 512Mi
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: data
        - mountPath: /etc/pg-config
          name: config
          readOnly: true
      initContainers:
      - command:
        - bash
        - -c
        - |
          #!/bin/bash
          set -e

          ORDINAL=${POD_NAME##*-}
          PGDATA="/var/lib/postgresql/data/pgdata"

          # Idempotent: skip if already initialized
          if [ -f "$PGDATA/PG_VERSION" ]; then
              echo "PGDATA already initialized, copying config only"
              cp /etc/pg-config/postgresql.conf "$PGDATA/postgresql.conf"
              cp /etc/pg-config/pg_hba.conf "$PGDATA/pg_hba.conf"
              exit 0
          fi

          if [ "$ORDINAL" = "0" ]; then
              echo "Initializing primary (ordinal 0)"
              initdb -D "$PGDATA" --auth-local=trust --auth-host=md5

              # Set superuser password
              pg_ctl -D "$PGDATA" start -w -o "-c listen_addresses='localhost'"
              psql -U postgres -c "ALTER USER postgres PASSWORD '$POSTGRES_PASSWORD';"
              psql -U postgres -c "CREATE ROLE repl_user WITH REPLICATION LOGIN PASSWORD '$REPLICATION_PASSWORD';"

              # Create application databases and users
              psql -U postgres -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='app_user') THEN CREATE ROLE app_user WITH LOGIN PASSWORD '$DB_PASSWORD_APP_USER'; END IF; END \$\$;"
              psql -U postgres -c "SELECT 'CREATE DATABASE myapp OWNER app_user' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'myapp')" --no-align -t | psql -U postgres
              psql -U postgres -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='analyst') THEN CREATE ROLE analyst WITH LOGIN PASSWORD '$DB_PASSWORD_ANALYST'; END IF; END \$\$;"
              psql -U postgres -c "SELECT 'CREATE DATABASE analytics OWNER analyst' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'analytics')" --no-align -t | psql -U postgres
              pg_ctl -D "$PGDATA" stop -w

              # Copy config
              cp /etc/pg-config/postgresql.conf "$PGDATA/postgresql.conf"
              cp /etc/pg-config/pg_hba.conf "$PGDATA/pg_hba.conf"
          else
              echo "Initializing replica (ordinal $ORDINAL)"
              PRIMARY_HOST="app-pg-0.app-pg-headless.default.svc.cluster.local"
              until pg_isready -h "$PRIMARY_HOST" -U postgres; do
                  echo "Waiting for primary..."
                  sleep 2
              done
              PGPASSWORD="$REPLICATION_PASSWORD" pg_basebackup \
                  -h "$PRIMARY_HOST" -U repl_user -D "$PGDATA" -R -Xs -P
              cp /etc/pg-config/postgresql.conf "$PGDATA/postgresql.conf"
              cp /etc/pg-config/pg_hba.conf "$PGDATA/pg_hba.conf"
          fi
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: superuser-password
              name: app-pg-secret
        - name: REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              key: replication-password
              name: app-pg-secret
        - name: DB_PASSWORD_APP_USER
          valueFrom:
            secretKeyRef:
              key: password-app_user
              name: app-pg-secret
        - name: DB_PASSWORD_ANALYST
          valueFrom:
            secretKeyRef:
              key: password-analyst
              name: app-pg-secret
        image: postgres:17-alpine
        name: pg-init
        resources: {}
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: data
        - mountPath: /etc/pg-config
          name: config
      securityContext:
        fsGroup: 70
        runAsGroup: 70
        runAsUser: 70
      volumes:
      - configMap:
          name: app-pg-config
        name: config
      - name: secret
        secret:
          secretName: app-pg-secret
  updateStrategy: {}
  volumeClaimTemplates:
  - metadata:
      labels:
        app.kubernetes.io/managed-by: pg-swarm
        app.kubernetes.io/name: postgresql
        pg-swarm.io/cluster: app-pg
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
    status: {}
status:
  availableReplicas: 0
  replicas: 0
