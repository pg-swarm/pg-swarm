data:
  pg_hba.conf: |
    # TYPE  DATABASE  USER  ADDRESS  METHOD
    local all all trust
    host all all 0.0.0.0/0 md5
    host replication repl_user 0.0.0.0/0 md5
    host all app_user 10.0.0.0/8 md5
  postgresql.conf: |
    archive_command = 'test ! -f /wal-archive/%f && cp %p /wal-archive/%f'
    archive_mode = on
    archive_timeout = 120
    hot_standby = on
    listen_addresses = '*'
    max_replication_slots = 10
    max_wal_senders = 10
    shared_buffers = 256MB
    wal_level = replica
    wal_log_hints = on
    work_mem = 16MB
metadata:
  labels:
    app.kubernetes.io/managed-by: pg-swarm
    app.kubernetes.io/name: postgresql
    pg-swarm.io/cluster: my-pg-wal
  name: my-pg-wal-config
  namespace: default
