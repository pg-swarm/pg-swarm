data:
  config.json: |-
    {
      "clusterName":  "my-pg-s3",
      "namespace":  "default",
      "replicas":  3,
      "postgres":  {
        "version":  "17",
        "image":  "postgres:17-alpine"
      },
      "storage":  {
        "size":  "10Gi"
      },
      "resources":  {
        "cpuRequest":  "250m",
        "cpuLimit":  "1",
        "memoryRequest":  "512Mi",
        "memoryLimit":  "1Gi"
      },
      "pgParams":  {
        "shared_buffers":  "256MB",
        "work_mem":  "16MB"
      },
      "hbaRules":  [
        "host all app_user 10.0.0.0/8 md5"
      ],
      "configVersion":  "1",
      "archive":  {
        "mode":  "custom",
        "archiveCommand":  "aws s3 cp %p s3://my-bucket/wal/%f",
        "restoreCommand":  "aws s3 cp s3://my-bucket/wal/%f %p",
        "archiveTimeoutSeconds":  300,
        "credentialsSecret":  {
          "name":  "aws-credentials"
        }
      }
    }
metadata:
  labels:
    app.kubernetes.io/managed-by: pg-swarm
    app.kubernetes.io/name: postgresql
    pg-swarm.io/cluster: my-pg-s3
  name: pg-swarm-minikube-my-pg-s3
  namespace: default
