apiVersion: v1
data:
  config.json: |-
    {
      "clusterName": "minimal",
      "namespace": "default",
      "replicas": 1,
      "postgres": {
        "version": "16",
        "image": "postgres:16"
      },
      "storage": {
        "size": "1Gi"
      },
      "configVersion": "1"
    }
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/managed-by: pg-swarm
    app.kubernetes.io/name: postgresql
    pg-swarm.io/cluster: minimal
  name: pg-swarm-minikube-minimal
  namespace: default
