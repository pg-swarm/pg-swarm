apiVersion: v1
data:
  pg_hba.conf: |
    # TYPE  DATABASE  USER  ADDRESS  METHOD
    local all all trust
    host all all 0.0.0.0/0 md5
    host replication repl_user 0.0.0.0/0 md5
  postgresql.conf: |
    archive_mode = off
    hot_standby = on
    listen_addresses = '*'
    max_replication_slots = 10
    max_slot_wal_keep_size = -1
    max_wal_senders = 10
    wal_level = replica
    wal_log_hints = on
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/managed-by: pg-swarm
    app.kubernetes.io/name: postgresql
    pg-swarm.io/cluster: minimal
  name: minimal-config
  namespace: default
