apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-swarm-satellite
  namespace: pgswarm-system
  labels:
    app: pg-swarm-satellite
    app.kubernetes.io/part-of: pg-swarm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pg-swarm-satellite
  template:
    metadata:
      labels:
        app: pg-swarm-satellite
    spec:
      serviceAccountName: pg-swarm-satellite
      terminationGracePeriodSeconds: 30
      containers:
        - name: satellite
          image: ghcr.io/pg-swarm/pg-swarm-satellite:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Identity injected from the K8s secret written by the satellite after approval.
            # Both keys are optional so the pod starts normally on first boot
            # before any registration has occurred.
            - name: PG_SWARM_SATELLITE_ID
              valueFrom:
                secretKeyRef:
                  name: pg-swarm-satellite-identity
                  key: satellite-id
                  optional: true
            - name: PG_SWARM_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pg-swarm-satellite-identity
                  key: auth-token
                  optional: true
          ports:
            - name: sidecar-grpc
              containerPort: 9091
              protocol: TCP
          envFrom:
            - configMapRef:
                name: satellite-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
