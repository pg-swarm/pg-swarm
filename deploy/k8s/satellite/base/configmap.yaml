apiVersion: v1
kind: ConfigMap
metadata:
  name: satellite-config
  namespace: pgswarm-system
  labels:
    app: pg-swarm-satellite
    app.kubernetes.io/part-of: pg-swarm
data:
  CENTRAL_ADDR: "pg-swarm-central-grpc.pgswarm-system.svc.cluster.local:9090"
  # Override K8S_CLUSTER_NAME with the name of this edge cluster.
  K8S_CLUSTER_NAME: "minikube"
  REGION: "local"
  # Default namespace for deploying PostgreSQL clusters when not specified in the cluster config.
  DEPLOY_NAMESPACE: "default"
  # Default failover sidecar image used when the cluster config does not specify one.
  DEFAULT_FAILOVER_IMAGE: "ghcr.io/pg-swarm/pg-swarm-failover:latest"
