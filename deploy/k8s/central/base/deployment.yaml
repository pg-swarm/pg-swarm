apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-swarm-central
  namespace: pgswarm-system
  labels:
    app: pg-swarm-central
    app.kubernetes.io/part-of: pg-swarm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pg-swarm-central
  template:
    metadata:
      labels:
        app: pg-swarm-central
    spec:
      serviceAccountName: pg-swarm-central
      terminationGracePeriodSeconds: 30
      initContainers:
        # Wait for PostgreSQL to be ready before starting central.
        - name: wait-for-postgres
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h $(PG_HOST) -p $(PG_PORT) -U $(PG_USER); do
                echo "waiting for postgres..."; sleep 2
              done
          env:
            - name: PG_HOST
              value: postgres.pgswarm-system.svc.cluster.local
            - name: PG_PORT
              value: "5432"
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
      containers:
        - name: central
          image: ghcr.io/pg-swarm/pg-swarm-central:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: grpc
            - containerPort: 8080
              name: http
          env:
            - name: PG_HOST
              value: postgres.pgswarm-system.svc.cluster.local
            - name: PG_PORT
              value: "5432"
            - name: PG_SSL_MODE
              value: disable
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: PG_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: database
          envFrom:
            - configMapRef:
                name: central-config
          readinessProbe:
            httpGet:
              path: /api/v1/satellites
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/satellites
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pg-swarm-central
  namespace: pgswarm-system
  labels:
    app.kubernetes.io/part-of: pg-swarm
